<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Venue Owner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #333;
            font-size: 22px;
            border-bottom: 2px solid #25D366;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: #25D366;
            /* WhatsApp Green */
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background-color: #128C7E;
        }

        /* Style for the hidden success screen */
        #successScreen {
            display: none;
            text-align: center;
        }

        #successScreen h2 {
            border: none;
            color: #25D366;
        }

        .loader {
            margin: 15px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="formScreen">
            <h2>Contact Us (For Venue Owner)</h2>
            <form id="venueForm" method="post" action="/venue">
                <div class="form-group">
                    <label for="venueName">Venue Name *</label>
                    <input type="text" id="venueName" required placeholder="Enter your venue name">
                </div>

                <div class="form-group">
                    <label for="venueOwner">Venue Owner *</label>
                    <input type="text" id="venueOwner" required placeholder="Enter owner's full name">
                </div>

                <div class="form-group">
                    <label for="whatsappNo">Venue Owner/Manager's WhatsApp No. *</label>
                    <input type="tel" id="whatsappNo" required placeholder="e.g., +1234567890">
                </div>

                <div class="form-group">
                    <label for="note">Note (Optional)</label>
                    <textarea id="note" rows="4" placeholder="Any additional details..."></textarea>
                </div>

                <button type="submit">Submit Details</button>
            </form>
        </div>

        <div id="successScreen">
            <h2>Submission Successful!</h2>
            <p>We will contact you soon.</p>
            <div class="loader"></div>
            <p style="color: #777; font-size: 13px;">Redirecting you...</p>
        </div>
    </div>

    <script>
        document.getElementById('venueForm').addEventListener('submit', function (event) {
            // Prevent the standard form reload so we can handle the transition smoothly
            event.preventDefault();

            // 1. (Optional) Here is where you would process or send data to your server/API
            const formData = {
                venueName: document.getElementById('venueName').value,
                venueOwner: document.getElementById('venueOwner').value,
                whatsappNo: document.getElementById('whatsappNo').value,
                note: document.getElementById('note').value
            };

            // 2. Hide the form screen and reveal the success screen
            document.getElementById('formScreen').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';

            fetch('/venue', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            }).then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
                .then(data => {
                    console.log("Data processed successfully:", data);

                    // 4. Use the URL sent dynamically by the server to safely redirect
                    if (data.redirectUrl) {
                        setTimeout(function () {
                            window.location.href = data.redirectUrl;
                        }, 3000);
                    }
                })
                .catch(error => {
                    console.error("Error sending data:", error);
                    alert("Something went wrong. Please try again.");
                    // Re-show form if it fails
                    document.getElementById('formScreen').style.display = 'block';
                    document.getElementById('successScreen').style.display = 'none';
                });
        });
    </script>

</body>

</html>
